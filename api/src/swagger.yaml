openapi: 3.0.3
info:
  title: Budget-Flow API
  description: API de gestão financeira compartilhada
  version: 1.0.0
servers:
  - url: http://localhost:3001
    description: Servidor local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Token:
      type: object
      properties:
        token:
          type: string
    Transaction:
      type: object
      properties:
        id:
          type: integer
        descricao:
          type: string
        valor:
          type: number
        tipo:
          type: string
          enum: [ENTRADA, SAIDA]
        categoria:
          type: string
          enum:
            - Aluguel/Financiamento
            - Condominio
            - Luz (Energia)
            - Agua
            - Internet/TV a cabo
            - Gas
            - Supermercado (Compra do mes)
            - Restaurantes e Bares
            - Delivery (iFood/Ze Delivery)
            - Padaria e Cafes
            - Combustivel
            - Uber / 99 / Taxi
            - Transporte Publico (Onibus/Metro)
            - Manutencao e Seguro (Gastos fixos com carro)
            - Farmacia
            - Plano de Saude / Medicos
            - Academia
            - Higiene e Cosmeticos
            - Assinaturas (Netflix, Spotify, Games)
            - Roupas e Acessorios
            - Hobbies / Cinema / Shows
            - Presentes
            - Mensalidades (Escola/Faculdade)
            - Cursos e Livros
            - Fatura do Cartao
            - Emprestimos / Juros
            - Investimentos / Poupanca
            - Impostos (IPTU, IPVA)
            - Outros
        responsavel:
          type: string
        data:
          type: string
          format: date
        user_id:
          type: integer
    TransactionInput:
      type: object
      required: [descricao, valor, tipo, categoria, responsavel, data]
      properties:
        descricao:
          type: string
        valor:
          type: number
          minimum: 0.01
        tipo:
          type: string
          enum: [ENTRADA, SAIDA]
        categoria:
          type: string
          enum:
            - Aluguel/Financiamento
            - Condominio
            - Luz (Energia)
            - Agua
            - Internet/TV a cabo
            - Gas
            - Supermercado (Compra do mes)
            - Restaurantes e Bares
            - Delivery (iFood/Ze Delivery)
            - Padaria e Cafes
            - Combustivel
            - Uber / 99 / Taxi
            - Transporte Publico (Onibus/Metro)
            - Manutencao e Seguro (Gastos fixos com carro)
            - Farmacia
            - Plano de Saude / Medicos
            - Academia
            - Higiene e Cosmeticos
            - Assinaturas (Netflix, Spotify, Games)
            - Roupas e Acessorios
            - Hobbies / Cinema / Shows
            - Presentes
            - Mensalidades (Escola/Faculdade)
            - Cursos e Livros
            - Fatura do Cartao
            - Emprestimos / Juros
            - Investimentos / Poupanca
            - Impostos (IPTU, IPVA)
            - Outros
        responsavel:
          type: string
        data:
          type: string
          format: date
    Summary:
      type: object
      properties:
        total_entradas:
          type: number
        total_despesas:
          type: number
        saldo_mensal:
          type: number
        is_limite_excedido:
          type: boolean
        resumo_por_pessoa:
          type: object
          additionalProperties:
            type: number
        resumo_por_pessoa_categoria:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: number
    CategoryGroup:
      type: object
      properties:
        group:
          type: string
        options:
          type: array
          items:
            type: string
    Error:
      type: object
      properties:
        erro:
          type: string

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Autenticar usuário
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /transactions:
    get:
      tags: [Transactions]
      summary: Listar transações por mês e ano
      parameters:
        - in: query
          name: mes
          required: true
          schema:
            type: integer
        - in: query
          name: ano
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista de transações
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
        '401':
          description: Não autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Transactions]
      summary: Criar nova transação
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionInput'
      responses:
        '201':
          description: Transação criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Não autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /transactions/{id}:
    put:
      tags: [Transactions]
      summary: Atualizar transação
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionInput'
      responses:
        '200':
          description: Transação atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Não autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Transação não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Transactions]
      summary: Excluir transação
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Transação excluída
        '401':
          description: Não autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Transação não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /summary/{mes}/{ano}:
    get:
      tags: [Summary]
      summary: Resumo financeiro mensal
      parameters:
        - in: path
          name: mes
          required: true
          schema:
            type: integer
        - in: path
          name: ano
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Resumo mensal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Summary'

  /categories:
    get:
      tags: [Categories]
      summary: Listar categorias permitidas para transacoes
      responses:
        '200':
          description: Lista de grupos e categorias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryGroup'
        '401':
          description: Nao autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
